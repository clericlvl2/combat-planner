name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # specs/reference/acceptance-matrix.md CI gate: lint -> types -> unit -> build -> e2e.
      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (svelte-check)
        run: npm run check

      - name: Unit + component tests (Vitest)
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Warn-only, per specs/README.md change-unit lifecycle: commits touching src/** should carry
  # a "Spec: NNN-slug" trailer. Escalate to blocking once the spec-driven-development flow (see
  # .claude/skills/spec-*) has proven itself over a few real change units.
  spec-trailer-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check src/** commits carry a Spec trailer (warn-only)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if git diff-tree --no-commit-id --name-only -r "$sha" | grep -q '^src/'; then
              if ! git log -1 --format=%B "$sha" | grep -qE '^Spec: [0-9]{3}-[a-z0-9-]+$'; then
                echo "::warning::commit $sha touches src/** but has no 'Spec: NNN-slug' trailer"
                missing=1
              fi
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "One or more commits are missing a Spec trailer. Warn-only for now — see specs/README.md."
          fi
          exit 0
